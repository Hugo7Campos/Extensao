name: Deploy para GitHub Pages

on:
  # Roda automaticamente toda vez que houver um push na branch main
  push:
    branches: [main]
  # Permite rodar manualmente pela aba "Actions" no GitHub
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultâneos
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar o build de produção
        # As variáveis de ambiente do Supabase são injetadas aqui a partir dos GitHub Secrets
        # Configure-as em: Repositório > Settings > Secrets and variables > Actions
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Enviar pasta dist para o Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
